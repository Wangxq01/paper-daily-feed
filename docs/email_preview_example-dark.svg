<svg width="1200" height="760" viewBox="0 0 1200 760" style="max-width:100%;height:auto;" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Daily paper feeds dark email system preview</title>
  <desc id="desc">Dark email client UI showing a received Daily paper feeds recommendation email.</desc>

  <defs>
    <filter id="windowShadowDark" x="0" y="0" width="1200" height="760" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="cardShadowDark" x="0" y="0" width="760" height="420" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#007aff" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="avatarGradientDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#007aff"/>
      <stop offset="1" stop-color="#4da3ff"/>
    </linearGradient>
    <clipPath id="inboxClipDark">
      <rect x="78" y="234" width="268" height="104" rx="16"/>
    </clipPath>
    <clipPath id="messageClipDark">
      <rect x="488" y="390" width="616" height="260" rx="18"/>
    </clipPath>
    <clipPath id="previewClipDark">
      <rect x="420" y="246" width="680" height="438" rx="20"/>
    </clipPath>
  </defs>

  <rect x="64" y="46" width="1072" height="668" rx="28" fill="#0f1722" stroke="#243447" filter="url(#windowShadowDark)"/>
  <rect x="65" y="47" width="1070" height="60" rx="27" fill="#111d2e"/>
  <path d="M65 107H1135" stroke="#243447"/>

  <circle cx="102" cy="77" r="7" fill="#ff5f57"/>
  <circle cx="126" cy="77" r="7" fill="#ffbd2e"/>
  <circle cx="150" cy="77" r="7" fill="#28c840"/>
  <rect x="188" y="63.5" width="392" height="27" rx="13.5" fill="#182536"/>
  <text x="212" y="81" fill="#8b9bb0" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="500">Search mail</text>

  <rect x="65" y="108" width="307" height="605" fill="#0f1722"/>
  <path d="M372 108V713" stroke="#243447"/>
  <text x="83" y="167" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="25" font-weight="700">Inbox</text>
  <text x="83" y="191" fill="#8b9bb0" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="13">12 unread messages</text>

  <rect x="83" y="234" width="268" height="104" rx="16" fill="#182536" stroke="#1f6feb"/>
  <g clip-path="url(#inboxClipDark)">
    <circle cx="116" cy="267" r="19" fill="url(#avatarGradientDark)"/>
    <text x="116" y="273" fill="#ffffff" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="700">D</text>
    <text x="143" y="261" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="600">Daily Paper Feeds</text>
    <text x="305" y="261" fill="#58a6ff" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="600">09:00</text>
    <text x="143" y="286" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600">Paper feed for 20th ...</text>
    <text x="143" y="311" fill="#8b9bb0" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="12">Daily paper recommend...</text>
  </g>

  <rect x="373" y="108" width="762" height="605" fill="#0f1722"/>
  <text x="420" y="166" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="650">Paper feed for 20th May 2026</text>
  <text x="420" y="191" fill="#8b9bb0" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="13">From Daily Paper Feeds</text>
  <text x="1058" y="175" fill="#8b9bb0" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="13">Today, 09:00</text>
  <path d="M420 221H1093" stroke="#243447"/>

  <rect x="420" y="246" width="680" height="438" rx="20" fill="#111d2e"/>
  <g clip-path="url(#previewClipDark)">
    <text x="760" y="308" fill="#58a6ff" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">RESEARCH BULLETIN</text>
    <text x="760" y="351" fill="#58a6ff" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700">Daily paper feeds</text>
    <text x="760" y="384" fill="#c9d1d9" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="15">A recommendation of papers based on your research interests.</text>

    <rect x="488" y="414" width="616" height="260" rx="18" fill="#161b22" stroke="#1f6feb" filter="url(#cardShadowDark)"/>
    <g clip-path="url(#messageClipDark)">
      <text x="512" y="452" fill="#58a6ff" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="10.5" font-weight="700" letter-spacing="0.8">TRAVEL BEHAVIOUR AND SOCIETY · 2026-01-01</text>
      <text x="512" y="494" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700">Predicting short-term urban bike sharing demand in</text>
      <text x="512" y="520" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700">a coupled continuous and network space</text>
      <text x="512" y="556" fill="#c9d1d9" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="12.5">Shen Liang, Yang Xu, Guangyue Li, Xiaohu Zhang, Qiuping Li</text>
      <rect x="512" y="580" width="205" height="30" rx="15" fill="#007aff"/>
      <text x="615" y="600" fill="#ffffff" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700">Recommendation score: 57.9%</text>
      <text x="512" y="644" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="11.5" font-weight="700">TLDR:</text>
      <text x="553" y="644" fill="#c9d1d9" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="11.5">GeoTopo-Net jointly models dependencies in continuous and network spaces to improve short-term</text>
      <text x="512" y="665" fill="#c9d1d9" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="11.5">urban bike sharing demand prediction.</text>
    </g>

    <text x="760" y="707" fill="#c9d1d9" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="13">Built with <tspan fill="#58a6ff" font-weight="700">paper-daily-feed</tspan> by <tspan fill="#58a6ff" font-weight="700">nehSgnaiL</tspan>.</text>
    <text x="760" y="730" fill="#c9d1d9" text-anchor="middle" text-decoration="underline" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="11">Unsubscribe</text>
  </g>
</svg>
